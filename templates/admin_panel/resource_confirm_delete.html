{% extends 'base.html' %}
{% block title %}Delete Resource{% endblock %}
{% block page_title %}Delete Resource{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <div style="color:#dc3545; font-size:3rem;"><i class="fas fa-trash-alt"></i></div>
            <h5 class="fw-bold mt-3">Delete "{{ resource.name }}"?</h5>
            <p class="text-muted">This will also delete all associated bookings. This cannot be undone.</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'admin_resources' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
