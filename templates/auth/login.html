{% extends 'base.html' %}
{% block auth_content %}
<div style="min-height:100vh; background: linear-gradient(135deg, #1a3c6e 0%, #2d5fa3 100%); display:flex; align-items:center; justify-content:center;">
    <div style="width:100%; max-width:420px; padding:20px;">
        <div class="text-center mb-4">
            <div style="font-size:3rem; color:#f0a500;"><i class="fas fa-university"></i></div>
            <h2 style="color:white; font-weight:700; margin-top:10px;">UniBook</h2>
            <p style="color:rgba(255,255,255,0.7);">Asset Booking System</p>
        </div>
        <div class="card p-4">
            <h5 class="fw-bold mb-4 text-center" style="color:#1a3c6e;">Sign In</h5>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                           class="form-control {% if field.errors %}is-invalid{% endif %}"
                           {% if field.value %}value="{{ field.value }}"{% endif %}>
                    {% for error in field.errors %}
                        <div class="invalid-feedback">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted">
                Don't have an account? <a href="{% url 'register' %}" style="color:#1a3c6e; font-weight:600;">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
