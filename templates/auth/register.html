{% extends 'base.html' %}
{% block auth_content %}
<div style="min-height:100vh; background: linear-gradient(135deg, #1a3c6e 0%, #2d5fa3 100%); display:flex; align-items:center; justify-content:center; padding:30px 20px;">
    <div style="width:100%; max-width:550px;">
        <div class="text-center mb-4">
            <div style="font-size:2.5rem; color:#f0a500;"><i class="fas fa-university"></i></div>
            <h2 style="color:white; font-weight:700; margin-top:10px;">UniBook</h2>
        </div>
        <div class="card p-4">
            <h5 class="fw-bold mb-4 text-center" style="color:#1a3c6e;">Student Registration</h5>
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    {% for field in form %}
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                               class="form-control {% if field.errors %}is-invalid{% endif %}"
                               {% if field.value %}value="{{ field.value }}"{% endif %}>
                        {% for error in field.errors %}
                            <div class="invalid-feedback">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted">
                Already have an account? <a href="{% url 'login' %}" style="color:#1a3c6e; font-weight:600;">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
